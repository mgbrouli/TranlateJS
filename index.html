<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Conversor Binario</title>
    <style>
        body{
            background-color: rgb(141, 151, 160);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .centro{
            width: 500px;
            height: 400px;
            border: 1px solid gray;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .radius{
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .resposta{
            width: 400px;
            height: 50%;
            border: 1px dashed black;
            background-color: whitesmoke;
            word-break: break-all;
            overflow-wrap: break-word;
            
            
        }
        
    </style>
</head>
<body>

    <div class="centro">
        <div class="radius">
            <h1>Selecione a entrada de dados</h1>
            <label for="opcao_radio"><input type="radio" name="escolha" id="texto2" checked> Binario -> Texto</label>
            <label for="opcao_radio"><input type="radio" name="escolha" id="binario">Texto -> Binario </label>
            <label for="opcao_radio"><input type="radio" name="escolha" id="hexadecimal">Texto -> HexaDecimal</label>
            <label for="opcao_radio"><input type="radio" name="escolha" id="hex_to_text">HexaDecimal -> Texto</label>
            
        </div><!--radius-->

        <input type="text" name="texto" id="texto" placeholder="Digite um texto">
        <input type="button" value="Converter" id="converter">
        <textarea class="resposta" disabled wrap="hard"></textarea><!--respostoa-->
    </div><!--centro-->
    
    <script src="script.js"></script>
    
</body>
</html>
